<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flag Quiz</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            width: 95%;
            max-width: 420px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 30px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }
        
        .globe { font-size: 48px; }
        
        h1 {
            font-size: 2.8rem;
            font-weight: 700;
        }
        
        .level-select button {
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            border: none;
            border-radius: 16px;
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .easy { background: #22c55e; }
        .medium { background: #eab308; }
        .hard { background: #ef4444; }
        
        .level-select button:hover {
            transform: scale(1.05);
        }
        
        .quiz-area { display: none; }
        
        .flag-container {
            margin: 30px auto;
            padding: 20px;
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            max-width: 320px;
        }
        
        .flag {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-top: 30px;
        }
        
        .option {
            background: rgba(255,255,255,0.2);
            padding: 18px 12px;
            border-radius: 16px;
            font-size: 1.15rem;
            font-weight: 600;
            cursor: pointer;
        }
        
        .option:hover { background: rgba(255,255,255,0.35); }
        .option.correct { background: #22c55e; color: black; }
        .option.wrong { background: #ef4444; }
        
        .score { font-size: 1.4rem; margin: 15px 0; }
        
        .result { display: none; text-align: center; }
        
        .big-score {
            font-size: 4.5rem;
            font-weight: 700;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Level Screen -->
        <div id="level-screen">
            <div class="header">
                <span class="globe">🌍</span>
                <h1>Flag Quiz</h1>
            </div>
            <div class="level-select">
                <button class="easy" onclick="startQuiz(0)">Easy</button>
                <button class="medium" onclick="startQuiz(1)">Medium</button>
                <button class="hard" onclick="startQuiz(2)">Hard</button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz" class="quiz-area">
            <div class="score">Score: <span id="score">0</span> / <span id="total">0</span></div>
            
            <div class="flag-container">
                <img id="flag" class="flag" src="" alt="Flag">
            </div>
            
            <p style="font-size:1.3rem; margin:20px 0;">Which country’s flag is this?</p>
            
            <div id="options" class="options"></div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="result">
            <h2>Quiz Complete!</h2>
            <div class="big-score" id="final-score">85</div>
            <p id="final-message" style="font-size:1.4rem; margin:15px 0;"></p>
            <button onclick="restartQuiz()" 
                    style="padding:15px 40px; font-size:1.2rem; background:#4f46e5; color:white; border:none; border-radius:50px; cursor:pointer;">
                Play Again
            </button>
        </div>
    </div>

    <script>
        // === All Flags (you can add more) ===
        const allFlags = [
            {code: "af", name: "Afghanistan"}, {code: "al", name: "Albania"}, {code: "dz", name: "Algeria"},
            {code: "ar", name: "Argentina"}, {code: "au", name: "Australia"}, {code: "at", name: "Austria"},
            {code: "bd", name: "Bangladesh"}, {code: "be", name: "Belgium"}, {code: "br", name: "Brazil"},
            {code: "ca", name: "Canada"}, {code: "cn", name: "China"}, {code: "fr", name: "France"},
            {code: "de", name: "Germany"}, {code: "in", name: "India"}, {code: "id", name: "Indonesia"},
            {code: "it", name: "Italy"}, {code: "jp", name: "Japan"}, {code: "kr", name: "South Korea"},
            {code: "mx", name: "Mexico"}, {code: "nl", name: "Netherlands"}, {code: "pk", name: "Pakistan"},
            {code: "ru", name: "Russia"}, {code: "za", name: "South Africa"}, {code: "es", name: "Spain"},
            {code: "gb", name: "United Kingdom"}, {code: "us", name: "United States"}, {code: "zw", name: "Zimbabwe"}
        ];

        let score = 0;
        let questionNumber = 0;
        let quizQuestions = [];
        let answered = false;

        function getFlagUrl(code) {
            return `https://flagcdn.com/w320/${code}.png`;
        }

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function generateQuiz() {
            quizQuestions = [];
            let pool = shuffle([...allFlags]);
            const numQuestions = 20;

            for (let i = 0; i < numQuestions && i < pool.length; i++) {
                const correct = pool[i];
                let wrongs = shuffle(pool.filter(f => f.code !== correct.code)).slice(0, 3);
                let options = shuffle([correct, ...wrongs]);
                
                quizQuestions.push({ 
                    flag: correct, 
                    options: options, 
                    correctCode: correct.code 
                });
            }
        }

        function startQuiz(level) {
            score = 0;
            questionNumber = 0;
            answered = false;
            
            document.getElementById('level-screen').style.display = 'none';
            document.getElementById('quiz').style.display = 'block';
            
            generateQuiz();
            loadQuestion();
        }

        function loadQuestion() {
            if (questionNumber >= quizQuestions.length) {
                showResults();
                return;
            }

            answered = false;
            const q = quizQuestions[questionNumber];
            
            document.getElementById('flag').src = getFlagUrl(q.flag.code);
            
            const container = document.getElementById('options');
            container.innerHTML = '';
            
            q.options.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = opt.name;
                div.onclick = () => selectAnswer(opt.code, div);
                container.appendChild(div);
            });
            
            document.getElementById('score').textContent = score;
            document.getElementById('total').textContent = quizQuestions.length;
        }

        function selectAnswer(selectedCode, element) {
            if (answered) return;
            answered = true;

            const q = quizQuestions[questionNumber];
            const isCorrect = selectedCode === q.correctCode;

            document.querySelectorAll('.option').forEach(opt => {
                if (opt.textContent === q.flag.name) opt.classList.add('correct');
                else if (opt === element && !isCorrect) opt.classList.add('wrong');
            });

            if (isCorrect) score++;

            setTimeout(() => {
                questionNumber++;
                loadQuestion();
            }, 1300);
        }

        function showResults() {
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            const percentage = Math.round((score / quizQuestions.length) * 100);
            document.getElementById('final-score').textContent = percentage + "%";
            
            const msg = document.getElementById('final-message');
            if (percentage >= 90) msg.textContent = "🏆 Excellent! Flag Master!";
            else if (percentage >= 75) msg.textContent = "🎉 Very Good!";
            else if (percentage >= 60) msg.textContent = "👍 Good Job!";
            else msg.textContent = "🌍 Keep practicing!";
        }

        function restartQuiz() {
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('level-screen').style.display = 'block';
        }

        // Make sure functions are available globally
        window.startQuiz = startQuiz;
        window.restartQuiz = restartQuiz;
    </script>
</body>
</html>
